<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f0f13" />
<meta name="description" content="TDAFocus V2 — gestion de tâches, focus, templates et timer." />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="TDAFocus" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="icon" type="image/png" href="/icons/icon-192.png" />
<title>TDAFocus V2.3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{min-height:100%;background:#0f0f13;overscroll-behavior:none}
:root{--bg:#0f0f13;--bg2:#12121a;--surf:#171720;--surf2:#1d1d29;--line:rgba(255,255,255,.075);--line2:rgba(255,255,255,.11);--text:#f3f3f7;--muted:#8b8ba3;--faint:#52526a;--accent:#f5a623;--accent2:#ffbd5a;--accent-soft:rgba(245,166,35,.14);--ok:#4ecb71;--danger:#e05c5c;--blue:#60c8f5;--purple:#9b8ff5;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
body{background:#0f0f13;background-image:radial-gradient(circle at top,#1c1c29 0,#0f0f13 42%,#09090d 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;min-height:100dvh;padding-bottom:calc(72px + var(--safe-bottom));overscroll-behavior:none;overflow-x:hidden;touch-action:pan-y}body::before{content:"";position:fixed;inset:-80px 0 0 0;z-index:-1;background:#0f0f13;background-image:radial-gradient(circle at top,#1c1c29 0,#0f0f13 42%,#09090d 100%)}
button,input,select,textarea{font:inherit}button{cursor:pointer;border:none}input,select,textarea{width:100%;color:var(--text);background:#0b0b10;border:1px solid var(--line2);border-radius:14px;padding:13px 14px;outline:none;color-scheme:dark}textarea{resize:vertical}.hidden{display:none!important}
#offline-bar{display:none;padding:7px 16px;background:rgba(224,92,92,.13);color:var(--danger);font-size:12px;text-align:center;border-bottom:1px solid rgba(224,92,92,.25)}
.header{position:sticky;top:0;z-index:50;background:rgba(15,15,19,.78);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding-top:var(--safe-top)}
.header-inner{max-width:760px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand-line{display:flex;align-items:baseline;gap:8px}.brand{font-size:21px;font-weight:850;letter-spacing:-.04em}.brand span{color:var(--accent)}.version{font-size:10px;color:var(--faint);font-weight:800;letter-spacing:.08em;text-transform:uppercase}.date{font-size:12px;color:var(--muted);margin-top:3px}.header-actions{display:flex;gap:8px;align-items:center}
.app{max-width:760px;margin:0 auto;padding:18px 16px 0}.screen{display:none;animation:fade .18s ease;will-change:transform,opacity}.screen.active{display:block}.screen.swipe-left{animation:swipeLeft .2s ease}.screen.swipe-right{animation:swipeRight .2s ease}.hero{background:linear-gradient(145deg,rgba(245,166,35,.18),rgba(96,200,245,.05)),linear-gradient(145deg,#171720,#111118);border:1px solid rgba(245,166,35,.26);border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 18px 50px rgba(0,0,0,.35)}.hero-kicker{font-size:12px;color:var(--accent);font-weight:800;letter-spacing:.08em;text-transform:uppercase}.hero-title{font-size:24px;font-weight:850;letter-spacing:-.04em;margin-top:7px;line-height:1.08}.hero-sub{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.45}.row{display:flex;gap:10px;align-items:center}.spread{display:flex;align-items:center;justify-content:space-between;gap:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stack{display:flex;flex-direction:column;gap:10px}.section-title{font-size:13px;color:var(--muted);font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:22px 2px 10px}.card{background:linear-gradient(145deg,var(--surf),var(--surf2));border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 10px 30px rgba(0,0,0,.24);animation:rise .18s ease}.card.done{opacity:.5}.task-main{border-left:3px solid var(--accent)}.task-title{font-size:15px;font-weight:760;line-height:1.25}.task-meta{font-size:12px;color:var(--muted);margin-top:5px}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:750;border:1px solid var(--line2);color:var(--muted);background:rgba(255,255,255,.025)}.tag.accent{color:var(--accent);border-color:rgba(245,166,35,.35);background:var(--accent-soft)}.progress{height:5px;border-radius:999px;background:#0b0b10;overflow:hidden;margin-top:12px}.progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:999px;transition:.25s}.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:14px;font-weight:760;transition:transform .13s,opacity .13s,background .13s;min-height:42px}.btn:active{transform:scale(.97)}.btn-sm{min-height:34px;padding:8px 12px;font-size:12px}.btn-md{padding:11px 15px;font-size:14px}.btn-lg{width:100%;padding:14px 16px;font-size:15px}.btn-accent{background:linear-gradient(180deg,var(--accent2),var(--accent));color:#111}.btn-default{background:rgba(255,255,255,.045);color:var(--text);border:1px solid var(--line)}.btn-ghost{background:transparent;color:var(--muted)}.btn-danger{background:rgba(224,92,92,.12);color:var(--danger);border:1px solid rgba(224,92,92,.24)}.check{width:25px;height:25px;border-radius:9px;border:2px solid var(--line2);background:transparent;flex:none}.check.checked{background:var(--ok);border-color:var(--ok)}.task-top{display:flex;gap:12px;align-items:flex-start}.task-actions{display:flex;gap:6px;flex:none}.tabs{display:flex;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:5px;margin-bottom:14px}.tab{flex:1;border-radius:14px;min-height:40px;background:transparent;color:var(--muted);font-weight:780}.tab.active{background:var(--accent);color:#111}.pill-row{display:flex;gap:8px;overflow-x:auto;padding:1px 0 10px;margin-bottom:6px}.pill{white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:760}.pill.active{color:var(--accent);border-color:rgba(245,166,35,.4);background:var(--accent-soft)}.empty{padding:44px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line2);border-radius:20px;background:rgba(255,255,255,.025)}.steps{margin-top:12px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#101017}.step{display:flex;gap:10px;align-items:center;padding:11px 12px;border-bottom:1px solid var(--line)}.step:last-child{border-bottom:0}.step-text{font-size:13px;color:var(--text);line-height:1.25}.step.done .step-text{color:var(--muted);text-decoration:line-through}.focus-panel{text-align:center;padding:24px 18px}.timer{font-size:56px;line-height:1;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.06em;margin:22px 0 8px}.focus-task{font-size:20px;font-weight:850;letter-spacing:-.03em;line-height:1.12}.focus-step{background:#101017;border:1px solid var(--line);border-radius:18px;padding:15px;margin:18px 0;text-align:left}.big-stat{background:linear-gradient(145deg,var(--surf),#14141c);border:1px solid var(--line);border-radius:20px;padding:16px}.stat-val{font-size:30px;font-weight:900;color:var(--accent)}.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-top:4px}.template-card{text-align:left}.template-title{font-weight:820;font-size:15px}.template-desc{color:var(--muted);font-size:12px;margin-top:5px;line-height:1.35}.bottom-nav{position:fixed;touch-action:pan-x;user-select:none;-webkit-user-select:none;left:0;right:0;bottom:0;z-index:80;padding:6px 12px max(5px,var(--safe-bottom));background:rgba(15,15,19,.86);backdrop-filter:blur(24px);border-top:1px solid var(--line)}.nav-inner{position:relative;max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.nav-indicator{position:absolute;top:0;bottom:0;left:0;width:calc((100% - 15px)/4);border-radius:17px;background:linear-gradient(145deg,rgba(245,166,35,.22),rgba(245,166,35,.08));box-shadow:0 10px 26px rgba(245,166,35,.12);transform:translateX(0);transition:transform .24s cubic-bezier(.2,.8,.2,1);pointer-events:none}.nav-btn{position:relative;z-index:1;min-height:46px;border-radius:15px;background:transparent;color:var(--muted);font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.nav-btn.active{color:var(--accent)}.nav-ico{font-size:17px;line-height:1}.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;justify-content:center}.modal{width:100%;max-width:560px;max-height:92dvh;overflow:auto;background:linear-gradient(160deg,#1b1b25,#13131a);border:1px solid var(--line2);border-radius:25px 25px 0 0;padding:22px 18px calc(22px + var(--safe-bottom));box-shadow:0 -20px 50px rgba(0,0,0,.5);animation:slideUp .2s ease}.modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.modal-title h2{font-size:20px;letter-spacing:-.03em}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-actions{position:sticky;bottom:calc(-22px - var(--safe-bottom));margin:14px -18px calc(-22px - var(--safe-bottom));padding:12px 18px calc(12px + var(--safe-bottom));background:rgba(19,19,26,.82);backdrop-filter:blur(18px);display:flex;gap:10px}.install{position:fixed;left:50%;bottom:calc(86px + var(--safe-bottom));transform:translateX(-50%);z-index:150;width:min(92%,380px);background:var(--surf);border:1px solid rgba(245,166,35,.38);border-radius:18px;padding:12px;box-shadow:0 18px 50px rgba(0,0,0,.45)}
@keyframes fade{from{opacity:.65}to{opacity:1}}@keyframes swipeLeft{from{opacity:.75;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}@keyframes swipeRight{from{opacity:.75;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{opacity:.8;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:620px){.modal{border-radius:25px;padding:24px}.overlay{align-items:center;padding:22px}.form-actions{position:static;margin:16px 0 0;padding:0;background:none}.bottom-nav{left:50%;right:auto;transform:translateX(-50%);width:min(520px,94%);border:1px solid var(--line);border-radius:24px;bottom:10px;padding:7px}.nav-inner{max-width:none}.app{padding-bottom:84px}}@media(max-width:430px){.header-inner{padding:12px 14px}.app{padding:14px 12px 0}.grid{grid-template-columns:1fr 1fr}.timer{font-size:50px}.hero-title{font-size:22px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="offline-bar">Mode hors-ligne — données sauvegardées localement.</div>
<header class="header"><div class="header-inner"><div><div class="brand-line"><div class="brand"><span>TDA</span>Focus</div><div class="version">v2.3</div></div><div class="date" id="date-label"></div></div><div class="header-actions"><button class="btn btn-sm btn-default" onclick="openForm()">Nouvelle tâche</button></div></div></header>
<main class="app">
<section id="screen-today" class="screen active"></section>
<section id="screen-tasks" class="screen"></section>
<section id="screen-focus" class="screen"></section>
<section id="screen-stats" class="screen"></section>
</main>
<nav class="bottom-nav"><div class="nav-inner"><div class="nav-indicator" id="nav-indicator"></div>
<button class="nav-btn active" id="nav-today" onclick="setScreen('today')"><span class="nav-ico">⌂</span>Aujourd’hui</button>
<button class="nav-btn" id="nav-tasks" onclick="setScreen('tasks')"><span class="nav-ico">□</span>Tâches</button>
<button class="nav-btn" id="nav-focus" onclick="setScreen('focus')"><span class="nav-ico">◉</span>Focus</button>
<button class="nav-btn" id="nav-stats" onclick="setScreen('stats')"><span class="nav-ico">▥</span>Stats</button>
</div></nav>
<div id="install-banner" class="install hidden"><div class="spread"><div><strong>Installer TDAFocus</strong><div class="task-meta">Ajoute l’app à l’écran d’accueil.</div></div><button class="btn btn-sm btn-accent" id="install-btn">Installer</button><button class="btn btn-sm btn-ghost" onclick="hideInstall()">×</button></div></div>
<div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
<script src="/app.js"></script>
</body>
</html>
